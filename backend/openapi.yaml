openapi: 3.0.3
info:
  title: VAT Calculator API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /calculate:
    post:
      summary: Calculate VAT/Tax values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode, bill, vatRate, taxRate]
              properties:
                mode:
                  type: string
                  enum: [gross, vendor, category]
                bill:
                  type: number
                vatRate:
                  type: number
                taxRate:
                  type: number
                categoryCode:
                  type: string
      responses:
        '200':
          description: Calculation result
  /history:
    get:
      summary: List calculation history
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200': { description: History page }
    post:
      summary: Save calculation result
      responses:
        '201': { description: Saved }
  /categories:
    get:
      summary: List available categories
      responses:
        '200': { description: Category list }
  /auth/login:
    post:
      summary: Login and receive token pair
      responses:
        '200': { description: Access + refresh token }
  /auth/refresh:
    post:
      summary: Refresh access token
      responses:
        '200': { description: Refreshed token }
