<!doctype html>

    <style>

      .qr-wrap { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; margin-top: 0.7rem; }
      .qr-wrap img { width: 132px; height: 132px; border: 1px solid #ccdacc; border-radius: 8px; background: #fff; }
      .qr-wrap p { margin: 0; color: #42584e; font-size: 0.82rem; }

      .history-snapshot table td,
      .history-snapshot table th { font-size: 0.82rem; }
      .screen-only { display: block; }
      .easy-shell {
        display: grid;
        gap: 1rem;
      }
      .easy-header {
        background: linear-gradient(145deg, #ffffff 0%, #eef9ee 100%);
      }
      .easy-title {
        margin: 0;
        font-size: clamp(1.2rem, 2.5vw, 1.9rem);

      }

        margin: 0.4rem 0 0;

      }

      }

        display: grid;
        gap: 0.8rem;
        grid-template-columns: 1fr;
      }
      .easy-card {
        border: 1px solid #d4e0d2;

        margin: 0;

        font-size: 0.83rem;
      }
      .easy-form {
        display: grid;
        gap: 0.55rem;
      }
      .easy-form input,
      .easy-form select {
        min-height: 50px;

      }
      .easy-form .actions button {
        min-height: 50px;

      }

      }
      .easy-history {

        align-self: start;

    <script>
      (function () {
        var BILL_MAX = 10000000;
        var HISTORY_KEY = 'bd_vat_tax_history_v2';

        var categories = [

        function storageGet() {
          try { return window.localStorage; } catch (e) { return null; }
        }

        function loadHistory() {
          var s = storageGet();
          if (!s) return [];
          try {
            var raw = s.getItem(HISTORY_KEY);
            if (!raw) return [];
            var parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
          } catch (e) {
            return [];
          }
        }

        function saveHistory() {
          var s = storageGet();
          if (!s) return;
          try { s.setItem(HISTORY_KEY, JSON.stringify(state.history)); } catch (e) {}
        }

        function t(key) { return labels[state.lang][key]; }

        function applyRoleTheme() {
          document.body.setAttribute('data-role-theme', state.roleTheme);
        }

        function getVisibleCategories() {
          if (!state.officialMode) return categories;
          var approved = [];
          for (var i = 0; i < categories.length; i++) {
            if (categories[i].approved) approved.push(categories[i]);
          }
          return approved;
        }

        function hashString(input) {
          var hash = 5381;
          for (var i = 0; i < input.length; i++) {
            hash = ((hash << 5) + hash) + input.charCodeAt(i);
            hash = hash >>> 0;
          }
          return hash.toString(16).toUpperCase();
        }

        function roleLabel(roleKey) {
          if (roleKey === 'procurement') return t('roleProcurement');
          if (roleKey === 'vendor') return t('roleVendor');
          return t('roleFinance');
        }

        function money(value) {
          var locale = state.lang === 'bn' ? 'bn' : 'en-IN';
          var safe = Number(value || 0);
          var scaled = Math.round(safe * 100) / 100;
          var hasFraction = Math.abs(scaled % 1) > 0;
          try {
            return new Intl.NumberFormat(locale, {
              minimumFractionDigits: hasFraction ? 1 : 0,
              maximumFractionDigits: hasFraction ? 2 : 0,
              useGrouping: true
            }).format(scaled);
          } catch (e) {
            return String(scaled);
          }
        }

        function parseNum(v) {
          if (v === null || v === undefined || v === '') return NaN;
          var normalized = String(v)
            .replace(/[০-৯]/g, function (d) { return String('০১২৩৪৫৬৭৮৯'.indexOf(d)); })
            .replace(/[,،\s]/g, '');
          return Number(normalized);
        }

        function getSharedBill() {
          var input = document.getElementById('shared-bill');
          if (!input) return parseNum(state.sharedBillText);
          state.sharedBillText = input.value;
          return parseNum(input.value);
        }

        function validate(payload) {
          if (isNaN(payload.bill) || isNaN(payload.vatRate) || isNaN(payload.taxRate)) return t('validationNumeric');
          if (payload.bill < 0 || payload.vatRate < 0 || payload.taxRate < 0) return t('validationNegative');
          if (payload.vatRate > 100 || payload.taxRate > 100) return t('validationRate');
          if (payload.bill > BILL_MAX) return t('validationBillMax');
          return null;
        }

        function calcGross(bill, vatRate, taxRate) {
          var base = bill;
          var vat = base * (vatRate / 100);
          var tax = base * (taxRate / 100);
          var total = base + vat + tax;
          return { base: base, vat: vat, tax: tax, total: total, actualPay: base };
        }

        function calcVendor(bill, vatRate, taxRate) {
          var divisor = 1 + ((vatRate + taxRate) / 100);
          var base = bill / divisor;
          var vat = base * (vatRate / 100);
          var tax = base * (taxRate / 100);
          var total = base + vat + tax;
          return { base: base, vat: vat, tax: tax, total: total, actualPay: base };
        }

        function modeLabel(mode) {
          if (mode === 'gross') return t('homeGross');
          if (mode === 'vendor') return t('homeVendor');
          if (mode === 'category') return t('homeCategory');
          return mode;
        }

        function calcByMode(mode, bill, vatRate, taxRate) {
          return mode === 'vendor' ? calcVendor(bill, vatRate, taxRate) : calcGross(bill, vatRate, taxRate);
        }

        function getVerificationPayload() {
          if (!state.result) return '';
          var payload = {
            time: state.result.createdAt,
            mode: state.result.mode,
            bill: state.result.input.bill,
            vatRate: state.result.input.vatRate,
            taxRate: state.result.input.taxRate,
            total: Number(state.result.output.total.toFixed(2)),
            actualPay: Number(state.result.output.actualPay.toFixed(2))
          };
          return JSON.stringify(payload);
        }

        function getQrUrl(payload) {
          return 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(payload);
        }

        function getCategoryTableHtml() {
          var rows = '';

          for (var i = 0; i < activeCategories.length; i++) {
            var c = activeCategories[i];

          }
          return '<table><thead><tr><th>' + t('formCategory') + '</th><th>' + t('formVat') + '</th><th>' + t('formTax') + '</th></tr></thead><tbody>' + rows + '</tbody></table>';
        }

        function getHistorySnapshotHtml() {
          if (!state.history.length) return '<p class="empty">' + t('historyEmpty') + '</p>';

              + '<td>' + money(h.input.bill) + '</td>'
              + '<td>' + money(h.output.total) + '</td>'
              + '</tr>';
          }
          return '<table><thead><tr><th>Date</th><th>' + t('resultMode') + '</th><th>' + t('formBill') + '</th><th>' + t('resultTotal') + '</th></tr></thead><tbody>' + rows + '</tbody></table>';
        }

        function bindForm(formId, mode) {
          var form = document.getElementById(formId);
          if (!form) return;
          form.addEventListener('submit', function (ev) {
            ev.preventDefault();
            var fd = new FormData(form);
            var selectedMode = mode === 'auto' ? String(fd.get('mode') || 'gross') : mode;
            var bill = getSharedBill();
            var vatRate = parseNum(fd.get('vatRate'));
            var taxRate = parseNum(fd.get('taxRate'));
            var categoryId = String(fd.get('category') || '');

            if (selectedMode === 'category') {
              var selected = null;
              var activeCategories = getVisibleCategories();
              for (var i = 0; i < activeCategories.length; i++) {
                if (activeCategories[i].id === categoryId) {
                  selected = activeCategories[i];
                  break;
                }
              }
              if (!selected) {
                setError(formId, t('validationRequired'));
                return;
              }
              vatRate = selected.vatRate;
              taxRate = selected.taxRate;
            }

            if (isNaN(bill) || isNaN(vatRate) || isNaN(taxRate)) {
              setError(formId, t('validationRequired'));
              return;
            }

            var bad = validate({ bill: bill, vatRate: vatRate, taxRate: taxRate });
            if (bad) {
              setError(formId, bad);
              return;
            }

            var output = selectedMode === 'vendor' ? calcVendor(bill, vatRate, taxRate) : calcGross(bill, vatRate, taxRate);
            state.result = {
              mode: selectedMode,
              categoryId: categoryId,
              input: { bill: bill, vatRate: vatRate, taxRate: taxRate },
              output: output,
              createdAt: new Date().toISOString()
            };

            var payload = getVerificationPayload();
            state.verification = {
              hash: hashString(payload),
              payload: payload,
              qrUrl: getQrUrl(payload)
            };

            state.history = [state.result].concat(state.history).slice(0, 12);
            state.historyPage = 1;
            saveHistory();
            setError(formId, '');
            updateShareLinkText('');
            refreshPanels();
            runFireworks();
          });
        }

        function csvEscape(value) {
          var str = String(value == null ? '' : value);
          if (str.indexOf('"') > -1 || str.indexOf(',') > -1 || str.indexOf('\n') > -1) {
            return '"' + str.replace(/"/g, '""') + '"';
          }
          return str;
        }

        function downloadCsv() {
          var rows = [
            ['Date', 'Mode', 'Bill', 'VAT Rate', 'TAX Rate', 'Base', 'VAT', 'TAX', 'Total', 'Actual Pay']
          ];
          for (var i = 0; i < state.history.length; i++) {
            var h = state.history[i];
            rows.push([
              new Date(h.createdAt).toISOString(),
              h.mode,
              h.input.bill,
              h.input.vatRate,
              h.input.taxRate,
              h.output.base,
              h.output.vat,
              h.output.tax,
              h.output.total,
              h.output.actualPay
            ]);
          }
          var csv = '';
          for (var r = 0; r < rows.length; r++) {
            var line = [];
            for (var c = 0; c < rows[r].length; c++) {
              line.push(csvEscape(rows[r][c]));
            }
            csv += line.join(',') + '\n';
          }
          var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'vat-tax-history.csv';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          updateProNote(t('csvReady'));
        }

        function bindCompareEngine() {

          btn.addEventListener('click', function () {
            var aMode = document.getElementById('cmp-a-mode').value;

            var aVat = parseNum(document.getElementById('cmp-a-vat').value);
            var aTax = parseNum(document.getElementById('cmp-a-tax').value);

            var bBill = getSharedBill();

            var bTax = parseNum(document.getElementById('cmp-b-tax').value);

            var badA = validate({ bill: aBill, vatRate: aVat, taxRate: aTax });
            var badB = validate({ bill: bBill, vatRate: bVat, taxRate: bTax });
            if (badA || badB) {
              updateProNote(t('invalidCompare'));
              return;
            }

            var outA = calcByMode(aMode, aBill, aVat, aTax);
            var outB = calcByMode(bMode, bBill, bVat, bTax);
            var totalDiff = outA.total - outB.total;
            var payDiff = outA.actualPay - outB.actualPay;
            var better = outA.actualPay <= outB.actualPay ? t('scenarioA') : t('scenarioB');

            state.compareResult = {
              totalDiff: totalDiff,
              payDiff: payDiff,
              better: better
            };
            updateProNote('');
            refreshPanels();
          });
        }

        function runFireworks() {
          var old = document.getElementById('fireworks-canvas');
          if (old && old.parentNode) old.parentNode.removeChild(old);

          var canvas = document.createElement('canvas');
          canvas.id = 'fireworks-canvas';
          canvas.className = 'fireworks-canvas';
          document.body.appendChild(canvas);

          var ctx = canvas.getContext('2d');
          if (!ctx) return;

          var w = canvas.width = window.innerWidth;
          var h = canvas.height = window.innerHeight;
          var colors = ['#ff4d6d', '#ffd166', '#06d6a0', '#4cc9f0', '#f72585', '#f77f00'];
          var particles = [];
          var bursts = 7;

          for (var b = 0; b < bursts; b++) {
            var cx = Math.random() * w;
            var cy = Math.random() * (h * 0.6);
            for (var i = 0; i < 46; i++) {
              var angle = (Math.PI * 2 * i) / 46;
              var speed = 2 + Math.random() * 4;
              particles.push({
                x: cx,
                y: cy,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 45 + Math.random() * 25,
                color: colors[Math.floor(Math.random() * colors.length)]
              });
            }
          }

          function frame() {
            ctx.clearRect(0, 0, w, h);
            for (var j = particles.length - 1; j >= 0; j--) {
              var p = particles[j];
              p.x += p.vx;
              p.y += p.vy;
              p.vy += 0.05;
              p.life -= 1;
              if (p.life <= 0) {
                particles.splice(j, 1);
                continue;
              }
              ctx.globalAlpha = Math.max(0, p.life / 70);
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
              ctx.fill();
            }

            if (particles.length) {
              requestAnimationFrame(frame);
            } else if (canvas.parentNode) {
              canvas.parentNode.removeChild(canvas);
            }
          }

          frame();
        }

        function prefillFromQuery() {
          var params = new URLSearchParams(window.location.search);
          if (!params.toString()) return;
          var mode = params.get('mode');
          var bill = params.get('bill');
          var vat = params.get('vat');
          var tax = params.get('tax');
          var category = params.get('category');

          function setForm(formId, map) {
            var f = document.getElementById(formId);
            if (!f) return;
            for (var key in map) {
              if (Object.prototype.hasOwnProperty.call(map, key) && f[key]) {
                f[key].value = map[key];
              }
            }
          }

          if (bill) state.sharedBillText = bill;
          if (mode || vat || tax || category) {
            var map = {};
            if (mode) map.mode = mode;
            if (vat) map.vatRate = vat;
            if (tax) map.taxRate = tax;
            if (category) map.category = category;
            setForm('unified-form', map);
            updateUnifiedFormByMode();
            var sel = document.getElementById('category-select');
            if (sel && mode === 'category') sel.dispatchEvent(new Event('change'));
          }
        }
