<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Bangladesh VAT & TAX Calculator" />
    <title>Bangladesh VAT & TAX Calculator</title>
    <style>
      :root {
        --bg: #f6f8ef;
        --ink: #1f2a1e;
        --muted: #5f6f62;
        --card: #ffffff;
        --line: #d6dfd2;
        --brand: #0b6a4e;
        --danger: #b72020;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "Hind Siliguri", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 12%, #e9f3d8 0%, transparent 42%),
          radial-gradient(circle at 92% 18%, #ffe9bf 0%, transparent 36%),
          linear-gradient(165deg, #f8f9f2 0%, #eef2e2 100%);
      }
      #app { width: min(1160px, 100% - 1rem); margin: 1rem auto 2rem; }
      .wrap { display: grid; gap: 1rem; }
      .hero, .box, .result, .history, .category-list {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1rem;
      }
      .hero { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
      .hero h1 { margin: 0; font-size: clamp(1.25rem, 2.8vw, 2rem); }
      .hero p { margin: 0.45rem 0 0; color: var(--muted); }
      .amount-wrap { display: grid; gap: 0.35rem; }
      .amount-wrap p { margin: 0; color: #4f665a; font-size: 0.85rem; }
      button { border: 0; border-radius: 9px; padding: 0.62rem 0.9rem; font-weight: 700; cursor: pointer; }
      .primary { color: #fff; background: var(--brand); }
      .ghost { background: #eff5ee; border: 1px solid #d6e2d3; color: #24372d; }
      .cards { display: grid; gap: 0.7rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .card { text-align: left; border: 1px solid #ccdbc9; border-radius: 10px; padding: 0.85rem; background: #f8fff4; }
      .card strong { display: block; color: #164e3a; }
      .card span { color: #5a6f62; font-size: 0.88rem; }
      .grid { display: grid; gap: 0.8rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      form { display: grid; gap: 0.55rem; margin-top: 0.7rem; }
      label { display: grid; gap: 0.3rem; font-size: 0.9rem; font-weight: 600; color: #2e473d; }
      input, select { border: 1px solid #c8d6c6; border-radius: 9px; padding: 0.55rem 0.7rem; font: inherit; background: #fff; }
      input[readonly] { background: #ecf6ef; }
      .actions { display: flex; gap: 0.5rem; }
      .actions button { flex: 1; }
      .error { margin: 0; color: var(--danger); min-height: 1rem; font-size: 0.82rem; }
      .out-grid { display: grid; gap: 0.8rem; grid-template-columns: 1.2fr 0.8fr; }
      .sticky-history { position: sticky; top: 0.8rem; align-self: start; }
      .head { display: flex; justify-content: space-between; align-items: center; gap: 0.6rem; margin-bottom: 0.7rem; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border: 1px solid #d3dfd0; padding: 0.55rem 0.7rem; text-align: left; }
      th { width: 45%; background: #e4f2e6; color: #1a553f; }
      .note { margin: 0.55rem 0 0; color: #0f6a4c; font-size: 0.85rem; }
      .empty { margin: 0; background: #f4f8f2; color: #5d6f61; border-radius: 8px; padding: 0.7rem; }
      .history-item { border: 1px solid #d7e3d4; border-radius: 9px; padding: 0.6rem; margin-bottom: 0.55rem; background: #fdfefb; }
      .history-item h4 { margin: 0; color: #17543e; }
      .history-item p { margin: 0.2rem 0 0; color: #4e6459; font-size: 0.85rem; }
      .history-item small { color: #6a7b71; display: block; margin-top: 0.25rem; }
      .kpi-grid { display: grid; gap: 0.6rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .kpi { border: 1px solid #d7e3d4; background: #f7fcf5; border-radius: 9px; padding: 0.65rem; }
      .kpi h4 { margin: 0; color: #1c5642; font-size: 0.85rem; }
      .kpi p { margin: 0.3rem 0 0; font-size: 1.02rem; font-weight: 700; }
      .pro-tools { display: flex; flex-wrap: wrap; gap: 0.5rem; }
      .compare-grid { display: grid; gap: 0.7rem; grid-template-columns: 1fr 1fr; }
      .compare-box { border: 1px solid #d7e3d4; border-radius: 10px; padding: 0.7rem; background: #fbfef9; }
      .compare-summary { border: 1px dashed #c4d5c2; border-radius: 10px; padding: 0.7rem; background: #f5faf2; }
      .fireworks-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        pointer-events: none;
      }
      footer { text-align: center; color: #50655a; font-size: 0.9rem; padding: 0.75rem; }
      .fatal {
        border: 1px solid #f0c3c3;
        background: #fff;
        border-radius: 12px;
        padding: 0.95rem;
        color: #5e3c3c;
      }
      .fatal h2 { margin: 0; color: #8d1f1f; }
      @media (max-width: 960px) {
        .grid { grid-template-columns: 1fr 1fr; }
        .grid .box:last-child { grid-column: 1 / -1; }
        .out-grid { grid-template-columns: 1fr; }
        .sticky-history { position: static; }
      }
      @media (max-width: 720px) {
        .hero { flex-direction: column; }
        .cards, .grid { grid-template-columns: 1fr; }
        .actions { flex-direction: column; }
        .head { flex-direction: column; align-items: stretch; }
        .kpi-grid, .compare-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <div class="fatal" style="margin:1rem">JavaScript is required to run this VAT & TAX calculator.</div>
    </noscript>

            grossTitle: 'গ্রস আপ VAT ও TAX ক্যালকুলেটর',
            vendorTitle: 'প্রোকিউরমেন্ট / ভেন্ডর ক্যালকুলেটর',

            winText: 'কম Pay সিনারিও',
            invalidCompare: 'দুই সিনারিওর জন্য সঠিক সংখ্যা দিন।',
            footerText: 'বাংলাদেশ VAT/TAX দ্রুত হিসাবের জন্য তৈরি।',
            validationRequired: 'সব ইনপুট পূরণ করতে হবে।',
            validationNumeric: 'শুধু সংখ্যা ইনপুট দিন।',
            validationNegative: 'Negative ইনপুট গ্রহণযোগ্য নয়।',
            validationRate: 'VAT/TAX হার 0 থেকে 100 এর মধ্যে হতে হবে।',
            validationBillMax: 'বিল এমাউন্ট ১ কোটির বেশি হতে পারবে না।',
            successLink: 'ফলাফলের লিংক কপি হয়েছে।',
            errorLink: 'এই ব্রাউজারে লিংক কপি করা যায়নি।',
            csvReady: 'CSV ডাউনলোড হয়েছে।',
            historyCleared: 'হিস্টোরি মুছে ফেলা হয়েছে।',
            selectCategory: 'ক্যাটাগরি নির্বাচন করুন',
            languageToggle: 'English'
          }
        };

        var state = {
          lang: 'bn',
          result: null,
          history: [],
          compareResult: null,
          sharedBillText: '10000'
        };

        function storageGet() {
          try { return window.localStorage; } catch (e) { return null; }
        }

        function loadHistory() {
          var s = storageGet();
          if (!s) return [];
          try {
            var raw = s.getItem(HISTORY_KEY);
            if (!raw) return [];
            var parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
          } catch (e) {
            return [];
          }
        }

        function saveHistory() {
          var s = storageGet();
          if (!s) return;
          try { s.setItem(HISTORY_KEY, JSON.stringify(state.history)); } catch (e) {}
        }

        function t(key) { return labels[state.lang][key]; }

        function money(value) {
          var locale = state.lang === 'bn' ? 'bn-BD' : 'en-BD';
          try {
            return new Intl.NumberFormat(locale, { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
          } catch (e) {
            return String(Math.round(value * 100) / 100);
          }
        }

        function parseNum(v) {
          if (v === null || v === undefined || v === '') return NaN;
          var normalized = String(v)
            .replace(/[০-৯]/g, function (d) { return String('০১২৩৪৫৬৭৮৯'.indexOf(d)); })
            .replace(/[,،\s]/g, '');
          return Number(normalized);
        }

        function getSharedBill() {
          var input = document.getElementById('shared-bill');
          if (!input) return parseNum(state.sharedBillText);
          state.sharedBillText = input.value;
          return parseNum(input.value);
        }

        function validate(payload) {
          if (isNaN(payload.bill) || isNaN(payload.vatRate) || isNaN(payload.taxRate)) return t('validationNumeric');
          if (payload.bill < 0 || payload.vatRate < 0 || payload.taxRate < 0) return t('validationNegative');
          if (payload.vatRate > 100 || payload.taxRate > 100) return t('validationRate');
          if (payload.bill > BILL_MAX) return t('validationBillMax');
          return null;
        }

        function calcGross(bill, vatRate, taxRate) {
          var base = bill;
          var vat = base * (vatRate / 100);
          var tax = base * (taxRate / 100);
          var total = base + vat + tax;
          return { base: base, vat: vat, tax: tax, total: total, actualPay: base };
        }

        function calcVendor(bill, vatRate, taxRate) {
          var divisor = 1 + ((vatRate + taxRate) / 100);
          var base = bill / divisor;
          var vat = base * (vatRate / 100);
          var tax = base * (taxRate / 100);
          var total = base + vat + tax;
          return { base: base, vat: vat, tax: tax, total: total, actualPay: base };
        }

        function modeLabel(mode) {
          if (mode === 'gross') return t('homeGross');
          if (mode === 'vendor') return t('homeVendor');
          if (mode === 'category') return t('homeCategory');
          return mode;
        }

        function calcByMode(mode, bill, vatRate, taxRate) {
          return mode === 'vendor' ? calcVendor(bill, vatRate, taxRate) : calcGross(bill, vatRate, taxRate);
        }

        function getCategoryTableHtml() {
          var rows = '';
          for (var i = 0; i < categories.length; i++) {
            var c = categories[i];
            var name = state.lang === 'bn' ? c.nameBn : c.nameEn;
            rows += '<tr><td>' + name + '</td><td>' + c.vatRate + '%</td><td>' + c.taxRate + '%</td></tr>';
          }
          return '<table><thead><tr><th>' + t('formCategory') + '</th><th>' + t('formVat') + '</th><th>' + t('formTax') + '</th></tr></thead><tbody>' + rows + '</tbody></table>';
        }

        function getHistoryHtml() {
          if (!state.history.length) return '<p class="empty">' + t('historyEmpty') + '</p>';
          var html = '';
          for (var i = 0; i < state.history.length; i++) {
            var item = state.history[i];
            html += '<article class="history-item">'
              + '<h4>' + modeLabel(item.mode) + '</h4>'
              + '<p>' + t('formBill') + ': ' + money(item.input.bill) + '</p>'
              + '<p>' + t('formVat') + ': ' + item.input.vatRate + '% | ' + t('formTax') + ': ' + item.input.taxRate + '%</p>'
              + '<p>' + t('resultTotal') + ': ' + money(item.output.total) + '</p>'
              + '<small>' + new Date(item.createdAt).toLocaleString() + '</small>'
              + '</article>';
          }
          return html;
        }

        function getKpiHtml() {
          if (!state.history.length) return '<p class="empty">' + t('historyEmpty') + '</p>';
          var totalBills = 0;
          var totalVat = 0;
          var totalTax = 0;
          for (var i = 0; i < state.history.length; i++) {
            totalBills += Number(state.history[i].input.bill || 0);
            totalVat += Number(state.history[i].output.vat || 0);
            totalTax += Number(state.history[i].output.tax || 0);
          }
          return '<div class="kpi-grid">'
            + '<article class="kpi"><h4>' + t('formBill') + '</h4><p>' + money(totalBills) + '</p></article>'
            + '<article class="kpi"><h4>' + t('resultVat') + '</h4><p>' + money(totalVat) + '</p></article>'
            + '<article class="kpi"><h4>' + t('resultTax') + '</h4><p>' + money(totalTax) + '</p></article>'
            + '</div>';
        }

        function getCompareHtml() {
          if (!state.compareResult) return '<p class="empty">' + t('noResult') + '</p>';
          var r = state.compareResult;
          return '<table><tbody>'
            + '<tr><th>' + t('totalDiff') + '</th><td>' + money(r.totalDiff) + '</td></tr>'
            + '<tr><th>' + t('payDiff') + '</th><td>' + money(r.payDiff) + '</td></tr>'
            + '<tr><th>' + t('winText') + '</th><td>' + r.better + '</td></tr>'
            + '</tbody></table>';
        }

        function getResultHtml() {
          if (!state.result) return '<p class="empty">' + t('noResult') + '</p>';
          var o = state.result.output;
          return '<table><tbody>'
            + '<tr><th>' + t('resultMode') + '</th><td>' + modeLabel(state.result.mode) + '</td></tr>'
            + '<tr><th>' + t('resultBase') + '</th><td>' + money(o.base) + '</td></tr>'
            + '<tr><th>' + t('resultVat') + '</th><td>' + money(o.vat) + '</td></tr>'
            + '<tr><th>' + t('resultTax') + '</th><td>' + money(o.tax) + '</td></tr>'
            + '<tr><th>' + t('resultTotal') + '</th><td>' + money(o.total) + '</td></tr>'
            + '<tr><th>' + t('resultActual') + '</th><td>' + money(o.actualPay) + '</td></tr>'
            + '</tbody></table>';
        }

        function setError(formId, message) {
          var el = document.querySelector('[data-error-for="' + formId + '"]');
          if (el) el.textContent = message;
        }

        function refreshPanels() {
          var result = document.getElementById('result-table');
          var hist = document.getElementById('history-area');
          var list = document.getElementById('category-list');
          var kpi = document.getElementById('kpi-area');
          var compare = document.getElementById('compare-out');
          if (result) result.innerHTML = getResultHtml();
          if (hist) hist.innerHTML = getHistoryHtml();
          if (list) list.innerHTML = getCategoryTableHtml();
          if (kpi) kpi.innerHTML = getKpiHtml();
          if (compare) compare.innerHTML = getCompareHtml();
        }

        function updateShareLinkText(msg) {
          var n = document.getElementById('share-note');
          if (n) n.textContent = msg;
        }

        function updateProNote(msg) {
          var n = document.getElementById('pro-note');
          if (n) n.textContent = msg;
        }

        function buildShareUrl() {
          if (!state.result) return '';
          var url = new URL(window.location.href);
          url.searchParams.set('mode', state.result.mode);
          url.searchParams.set('bill', String(state.result.input.bill));
          url.searchParams.set('vat', String(state.result.input.vatRate));
          url.searchParams.set('tax', String(state.result.input.taxRate));
          if (state.result.categoryId) url.searchParams.set('category', state.result.categoryId);
          return url.toString();
        }

        function bindForm(formId, mode) {
          var form = document.getElementById(formId);
          if (!form) return;
          form.addEventListener('submit', function (ev) {
            ev.preventDefault();
            var fd = new FormData(form);
            var bill = getSharedBill();
            var vatRate = parseNum(fd.get('vatRate'));
            var taxRate = parseNum(fd.get('taxRate'));
            var categoryId = String(fd.get('category') || '');

            if (mode === 'category') {
              var selected = null;
              for (var i = 0; i < categories.length; i++) {
                if (categories[i].id === categoryId) {
                  selected = categories[i];
                  break;
                }
              }
              if (!selected) {
                setError(formId, t('validationRequired'));
                return;
              }
              vatRate = selected.vatRate;
              taxRate = selected.taxRate;
            }

            if (isNaN(bill) || isNaN(vatRate) || isNaN(taxRate)) {
              setError(formId, t('validationRequired'));
              return;
            }

            var bad = validate({ bill: bill, vatRate: vatRate, taxRate: taxRate });
            if (bad) {
              setError(formId, bad);
              return;
            }

            var output = mode === 'vendor' ? calcVendor(bill, vatRate, taxRate) : calcGross(bill, vatRate, taxRate);
            state.result = {
              mode: mode,
              categoryId: categoryId,
              input: { bill: bill, vatRate: vatRate, taxRate: taxRate },
              output: output,
              createdAt: new Date().toISOString()
            };

            state.history = [state.result].concat(state.history).slice(0, 12);
            saveHistory();
            setError(formId, '');
            updateShareLinkText('');
            refreshPanels();
            runFireworks();
          });
        }

        function bindClearButtons() {

            buttons[i].addEventListener('click', function (ev) {

              var form = document.getElementById(id);
              if (form) form.reset();
              setError(id, '');
              state.result = null;

              refreshPanels();

        function bindCardScroll() {

        function bindCategoryAutoFill() {
          var sel = document.getElementById('category-select');

          sel.addEventListener('change', function () {

            for (var i = 0; i < categories.length; i++) {

                selected = categories[i];

            if (!selected || !v || !t) return;

          });

        function bindShareButton() {
          var btn = document.getElementById('copy-link');
          if (!btn) return;
          btn.addEventListener('click', function () {
            var link = buildShareUrl();
            if (!link) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(link).then(function () {
                updateShareLinkText(t('successLink'));
              }).catch(function () {
                updateShareLinkText(t('errorLink'));
              });
            } else {
              updateShareLinkText(link);
            }
          });
        }

        function csvEscape(value) {
          var str = String(value == null ? '' : value);
          if (str.indexOf('"') > -1 || str.indexOf(',') > -1 || str.indexOf('\n') > -1) {
            return '"' + str.replace(/"/g, '""') + '"';
          }
          return str;
        }

        function downloadCsv() {
          var rows = [
            ['Date', 'Mode', 'Bill', 'VAT Rate', 'TAX Rate', 'Base', 'VAT', 'TAX', 'Total', 'Actual Pay']
          ];
          for (var i = 0; i < state.history.length; i++) {
            var h = state.history[i];
            rows.push([
              new Date(h.createdAt).toISOString(),
              h.mode,
              h.input.bill,
              h.input.vatRate,
              h.input.taxRate,
              h.output.base,
              h.output.vat,
              h.output.tax,
              h.output.total,
              h.output.actualPay
            ]);
          }
          var csv = '';
          for (var r = 0; r < rows.length; r++) {
            var line = [];
            for (var c = 0; c < rows[r].length; c++) {
              line.push(csvEscape(rows[r][c]));
            }
            csv += line.join(',') + '\n';
          }
          var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'vat-tax-history.csv';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          updateProNote(t('csvReady'));
        }

        function bindCompareEngine() {
          var btn = document.getElementById('run-compare');
          if (!btn) return;
          btn.addEventListener('click', function () {
            var aMode = document.getElementById('cmp-a-mode').value;
            var aBill = getSharedBill();
            var aVat = parseNum(document.getElementById('cmp-a-vat').value);
            var aTax = parseNum(document.getElementById('cmp-a-tax').value);
            var bMode = document.getElementById('cmp-b-mode').value;
            var bBill = getSharedBill();
            var bVat = parseNum(document.getElementById('cmp-b-vat').value);
            var bTax = parseNum(document.getElementById('cmp-b-tax').value);

            var badA = validate({ bill: aBill, vatRate: aVat, taxRate: aTax });
            var badB = validate({ bill: bBill, vatRate: bVat, taxRate: bTax });
            if (badA || badB) {
              updateProNote(t('invalidCompare'));
              return;
            }

            var outA = calcByMode(aMode, aBill, aVat, aTax);
            var outB = calcByMode(bMode, bBill, bVat, bTax);
            var totalDiff = outA.total - outB.total;
            var payDiff = outA.actualPay - outB.actualPay;
            var better = outA.actualPay <= outB.actualPay ? t('scenarioA') : t('scenarioB');

            state.compareResult = {
              totalDiff: totalDiff,
              payDiff: payDiff,
              better: better
            };
            updateProNote('');
            refreshPanels();
          });
        }

          var input = document.getElementById('shared-bill');

        function runFireworks() {
          var old = document.getElementById('fireworks-canvas');
          if (old && old.parentNode) old.parentNode.removeChild(old);

          var canvas = document.createElement('canvas');
          canvas.id = 'fireworks-canvas';
          canvas.className = 'fireworks-canvas';
          document.body.appendChild(canvas);

          var ctx = canvas.getContext('2d');
          if (!ctx) return;

          var w = canvas.width = window.innerWidth;
          var h = canvas.height = window.innerHeight;
          var colors = ['#ff4d6d', '#ffd166', '#06d6a0', '#4cc9f0', '#f72585', '#f77f00'];
          var particles = [];
          var bursts = 7;

          for (var b = 0; b < bursts; b++) {
            var cx = Math.random() * w;
            var cy = Math.random() * (h * 0.6);
            for (var i = 0; i < 46; i++) {
              var angle = (Math.PI * 2 * i) / 46;
              var speed = 2 + Math.random() * 4;
              particles.push({
                x: cx,
                y: cy,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 45 + Math.random() * 25,
                color: colors[Math.floor(Math.random() * colors.length)]
              });
            }
          }

          function frame() {
            ctx.clearRect(0, 0, w, h);
            for (var j = particles.length - 1; j >= 0; j--) {
              var p = particles[j];
              p.x += p.vx;
              p.y += p.vy;
              p.vy += 0.05;
              p.life -= 1;
              if (p.life <= 0) {
                particles.splice(j, 1);
                continue;
              }
              ctx.globalAlpha = Math.max(0, p.life / 70);
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, 2.4, 0, Math.PI * 2);
              ctx.fill();
            }

            if (particles.length) {
              requestAnimationFrame(frame);
            } else if (canvas.parentNode) {
              canvas.parentNode.removeChild(canvas);
            }
          }

          frame();
        }

        function prefillFromQuery() {
          var params = new URLSearchParams(window.location.search);
          if (!params.toString()) return;
          var mode = params.get('mode');
          var bill = params.get('bill');
          var vat = params.get('vat');
          var tax = params.get('tax');
          var category = params.get('category');

          function setForm(formId, map) {
            var f = document.getElementById(formId);
            if (!f) return;
            for (var key in map) {
              if (Object.prototype.hasOwnProperty.call(map, key) && f[key]) {
                f[key].value = map[key];
              }
            }
          }

          if (bill) state.sharedBillText = bill;
          if (mode === 'gross' && vat && tax) setForm('gross-form', { vatRate: vat, taxRate: tax });
          if (mode === 'vendor' && vat && tax) setForm('vendor-form', { vatRate: vat, taxRate: tax });
          if (mode === 'category' && bill && category) {
            setForm('category-form', { category: category });
            var sel = document.getElementById('category-select');
            if (sel) sel.dispatchEvent(new Event('change'));
          }
        }

        function render() {
          var app = document.getElementById('app');
          if (!app) return;
          app.innerHTML = appHtml();

          var langBtn = document.getElementById('lang-toggle');
          if (langBtn) {
            langBtn.addEventListener('click', function () {
              state.lang = state.lang === 'bn' ? 'en' : 'bn';
              render();
            });
          }

          bindCardScroll();
          bindSharedAmount();
          bindCategoryAutoFill();
          bindForm('gross-form', 'gross');
          bindForm('vendor-form', 'vendor');
          bindForm('category-form', 'category');
          bindClearButtons();
          bindShareButton();
          bindProButtons();
          bindCompareEngine();
          prefillFromQuery();
          refreshPanels();
        }

        function fail(msg) {
          var app = document.getElementById('app');
          if (!app) return;
          app.innerHTML = '<div class="fatal"><h2>Runtime Error</h2><p>' + msg + '</p></div>';
        }

        try {
          state.history = loadHistory();
          render();
        } catch (e) {
          fail('The app failed to start. Please refresh and try again.');
        }
